services:
  web:
    build: .
    environment:
      ENV: dev
      APP_BASE_URL: http://localhost:8000
      DATABASE_URL: sqlite+aiosqlite:///db/app.db
      CHROMA_DIR: /app/db/chroma
      UPLOAD_DIR: /app/db/uploads
      SECRET_KEY: change-me
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db

