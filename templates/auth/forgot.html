{% extends "layout.html" %}

{% block title %}找回密码{% endblock %}

{% block body %}
  <div class="card" style="max-width:520px;margin:0 auto">
    <h1 class="title">找回密码</h1>
    <p class="muted" style="margin:0 0 16px">输入邮箱，我们会发送重置链接。</p>

    {% if sent %}
      <div class="alert" role="status">如果该邮箱已注册，将收到重置链接。</div>
    {% endif %}

    <form method="post" action="/forgot" class="form">
      <label class="label">邮箱</label>
      <input class="input" type="email" name="email" autocomplete="email" required />
      <button class="btn btn-primary" type="submit">发送重置链接</button>
    </form>

    <div class="row" style="margin-top:16px">
      <a class="link" href="/login">返回登录</a>
    </div>
  </div>
{% endblock %}
