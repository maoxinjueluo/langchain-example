{% extends "layout.html" %}

{% block title %}注册{% endblock %}

{% block body %}
  <div class="card" style="max-width:520px;margin:0 auto">
    <h1 class="title">注册</h1>
    <p class="muted" style="margin:0 0 16px">注册后将发送邮箱验证链接。</p>

    {% if error %}
      <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register" class="form" data-password-strength>
      <label class="label">邮箱</label>
      <input class="input" type="email" name="email" autocomplete="email" required />

      <label class="label">姓名</label>
      <input class="input" type="text" name="name" autocomplete="name" required />

      <label class="label">密码</label>
      <input class="input" type="password" name="password" autocomplete="new-password" required />
      <div class="muted" style="font-size:12px">至少 8 位，包含字母与数字</div>
      <div class="meter" aria-live="polite"></div>

      <button class="btn btn-primary" type="submit">注册</button>
    </form>

    <div class="row" style="margin-top:16px">
      <a class="link" href="/login">已有账号？登录</a>
    </div>
  </div>
{% endblock %}
