{% extends "layout.html" %}

{% block title %}重置密码{% endblock %}

{% block body %}
  <div class="card" style="max-width:520px;margin:0 auto">
    <h1 class="title">重置密码</h1>
    <p class="muted" style="margin:0 0 16px">设置一个新密码。</p>

    {% if error %}
      <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/reset" class="form" data-password-strength>
      <input type="hidden" name="token" value="{{ token }}" />
      <label class="label">新密码</label>
      <input class="input" type="password" name="password" autocomplete="new-password" required />
      <div class="muted" style="font-size:12px">至少 8 位，包含字母与数字</div>
      <div class="meter" aria-live="polite"></div>
      <button class="btn btn-primary" type="submit">确认重置</button>
    </form>
  </div>
{% endblock %}
